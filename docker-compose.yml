services:
  broker:
    container_name: "rabbitMQ"
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"   # broker port
      - "15672:15672" # management UI
  
  # run toxicity messages backend-api serivce: 
  backend-api:
    container_name: "toxicity-classifier-api"
    build: 
      context: ./toxic-messages-handling-project
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    
    # NOTE: backend-api should work independently 
    healthcheck:
      test: ["CMD-SHELL", "-c", "python healthchecks/fastapi_ready.py"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
      
  # run messages producer to take messages from s3 .csv and create a stream: 
  messages-producer:
    container_name: "messages-producer"
    build: 
      context: ./message_producers
      dockerfile: Dockerfile

    # take json and some s3 logic from toxicity api to use s3 credentials: 
    volumes:
      - ./toxic-messages-handling-project/src/config.json:/app/config.json:ro
      - ./toxic-messages-handling-project/src/services/utils.py:/app/utils.py:ro
      - ./toxic-messages-handling-project/src/core/config.py:/app/core/config.py:ro
      - ./src/message_producers/s3_csv_producer/source_config.json:/app/source_config.json:ro
  
  # prometheus for scraping /metrics from backend-api:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend-api:
        condition: service_healthy

  # grafana for dashboards (pre-provisioned):
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana/data
    depends_on:
      - prometheus
  

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local