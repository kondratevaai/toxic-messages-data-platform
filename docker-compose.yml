services:
  # create kafka topics to manage toxicity messages events
  # using custom kafka image for automatic tpic creation: 

  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"
    # networks:
    #   - producer-s3-csv
      # - prediction-network
  kafka:
    image: wurstmeister/kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # messages : 2 partitions (s3:.csv, web-stream) : 1 replication factor 
      KAFKA_CREATE_TOPICS: "toxic-messages:2:1"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --topic toxic-messages --describe"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      - zookeeper
    # networks:
    #   - producer-s3-csv
      # - prediction-network
  
  # kafbat-ui:
  #   container_name: kafbat-ui
  #   image: ghcr.io/kafbat/kafka-ui:latest
  #   ports:
  #     - 8080:8080
  #   environment:
  #     DYNAMIC_CONFIG_ENABLED: 'true'
  #     SWAGGER_UI_ENABLED: 'true'
  #   volumes:
  #     - ~/kui/config.yml:/etc/kafkaui/dynamic_config.yaml
  #   depends_on:
  #     - kafka
    
  # run toxicity messages backend-api serivce: 
  backend-api:
    container_name: "toxicity-classifier-api"
    build: 
      context: ./toxic-messages-handling-project
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      # demo is to print messages, so at least 1 producer should work: 
      - messages-producer
    # networks:
    #   - prediction-network

  # run messages producer to take messages from s3 .csv and create a stream: 
  messages-producer:
    container_name: "messages-producer"
    build: 
      context: ./message_producers/s3_csv_producer
      dockerfile: Dockerfile

    # take json and some s3 logic from toxicity api to use s3 credentials: 
    volumes:
      - ./toxic-messages-handling-project/src/config.json:/app/config.json:ro
      - ./toxic-messages-handling-project/src/services/utils.py:/app/utils.py:ro
      - ./toxic-messages-handling-project/src/core/config.py:/app/core/config.py:ro
    environment:
      - MODEL_CONFIG=/app/config.json
    depends_on:
      kafka:
        condition: service_healthy
    # networks:
    #   - producer-s3-csv

  # run spark consumer to take messages from kafka topic and pass them
  # to the toxicity classifier model for inference:
  # spark-consumer:
  #   container_name: "spark-consumer"
  #   build: 
  #     context: messages_consumers/spark_consumer
  #     dockerfile: Dockerfile
  #   depends_on:
  #     - kafka
  #   networks: 
  #     - prediction-network
  

networks:
  prediction-network:
    driver: bridge

  # register producer networks to isolate them: 
  producer-s3-csv:
    driver: bridge
  producer-web-stream:
    driver: bridge